apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dagshub-mlflow-edit-{{ .Release.Namespace }}
  labels:
    app: dagshub
    component: mlflow-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-edit
subjects:
- kind: ServiceAccount
  name: {{ .Values.mlflow.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dagshub-mlflow-view-{{ .Release.Namespace }}
  labels:
    app: dagshub
    component: mlflow-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-view
subjects:
- kind: ServiceAccount
  name: {{ .Values.mlflow.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dagshub-mlflow-integration-{{ .Release.Namespace }}
  labels:
    app: dagshub
    component: mlflow-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-integration
subjects:
- kind: ServiceAccount
  name: {{ .Values.mlflow.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
