{{- if .Values.workspaceProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.workspaceProxy.name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: dagshub
    component: {{ .Values.workspaceProxy.name }}
data:
  nginx.conf.template: |
    pid /tmp/nginx.pid;
    error_log stderr warn;
    events {
        worker_connections 1024;
    }
    http {
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;
        access_log off;

        server {
            listen {{ .Values.workspaceProxy.port }};

            # RHOAI MLflow rejects artifact_location when workspaces are enabled
            location ~ /api/2\.0/mlflow/experiments/create$ {
                access_by_lua_block {
                    ngx.req.read_body()
                    local body = ngx.req.get_body_data()
                    if body then
                        local cjson = require "cjson"
                        local ok, data = pcall(cjson.decode, body)
                        if ok and type(data) == "table" then
                            data.artifact_location = nil
                            ngx.req.set_body_data(cjson.encode(data))
                        end
                    end
                }
                proxy_pass {{ .Values.workspaceProxy.mlflowUrl }};
                proxy_set_header X-MLFLOW-WORKSPACE {{ .Values.workspaceProxy.workspace | default .Release.Namespace }};
                proxy_set_header Authorization "Bearer ${MLFLOW_TOKEN}";
                proxy_set_header Host mlflow.redhat-ods-applications.svc;
                proxy_ssl_verify off;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
                client_max_body_size 0;
            }

            location /api/ {
                proxy_pass {{ .Values.workspaceProxy.mlflowUrl }};
                proxy_set_header X-MLFLOW-WORKSPACE {{ .Values.workspaceProxy.workspace | default .Release.Namespace }};
                proxy_set_header Authorization "Bearer ${MLFLOW_TOKEN}";
                proxy_set_header Host mlflow.redhat-ods-applications.svc;
                proxy_ssl_verify off;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
                client_max_body_size 0;
            }

            location = / {
                default_type text/html;
                return 200 '<html><head><meta http-equiv="refresh" content="0;url={{ .Values.workspaceProxy.mlflowUiUrl | default "https://rh-ai.apps.ai-dev02.kni.syseng.devcluster.openshift.com/mlflow" }}"><script>window.location.href="{{ .Values.workspaceProxy.mlflowUiUrl | default "https://rh-ai.apps.ai-dev02.kni.syseng.devcluster.openshift.com/mlflow" }}"</script></head></html>';
            }
        }
    }
{{- end }}
