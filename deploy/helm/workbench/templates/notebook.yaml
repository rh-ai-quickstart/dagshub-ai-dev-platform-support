{{- if .Values.workbench.enabled }}
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ .Values.workbench.name }}-notebook
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.workbench.name }}-notebook
    opendatahub.io/dashboard: "true"
    opendatahub.io/odh-managed: "true"
    opendatahub.io/user: {{ .Values.workbench.username }}
  annotations:
    notebooks.opendatahub.io/inject-auth: "true"
    notebooks.opendatahub.io/last-image-selection: "s2i-minimal-notebook:{{ .Values.workbench.image.tag }}"
    notebooks.opendatahub.io/last-image-version-git-commit-selection: {{ .Values.workbench.image.gitCommit | quote }}
    opendatahub.io/hardware-profile-name: {{ .Values.workbench.hardwareProfile.name | quote }}
    opendatahub.io/hardware-profile-namespace: {{ .Values.workbench.hardwareProfile.namespace | quote }}
    opendatahub.io/username: {{ .Values.workbench.username }}
    opendatahub.io/image-display-name: "Jupyter | Minimal | CPU | Python 3.12"
    openshift.io/display-name: "{{ .Values.workbench.name }}-notebook"
spec:
  template:
    spec:
      initContainers:
      {{- if .Values.workbench.gitSync.enabled }}
      - name: git-clone
        image: {{ .Values.workbench.gitSync.image }}
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e
          echo "Starting git clone..."

          clone_repo() {
            repo=$1; branch=$2; dest=$3; retries=3; count=0
            until git clone --depth 1 --branch "$branch" "$repo" "$dest"; do
              count=$((count+1))
              if [ $count -ge $retries ]; then
                echo "Failed to clone $repo after $retries attempts, will use ConfigMap fallback"
                return 1
              fi
              echo "Retrying clone... ($count/$retries)"
              sleep 5
            done
          }

          if clone_repo "{{ .Values.workbench.gitSync.docs.repo }}" "{{ .Values.workbench.gitSync.docs.branch }}" /tmp/dagshub-docs && [ -d "/tmp/dagshub-docs/docs" ]; then
            rm -rf /workspace/docs
            find /tmp/dagshub-docs -type d -name "assets" -exec rm -rf {} + 2>/dev/null || true
            cp -rf "/tmp/dagshub-docs/docs" /workspace/
            find /workspace/docs -type f -exec chmod 644 {} \; 2>/dev/null || true
            echo "Documentation cloned successfully"
          fi
          rm -rf /tmp/dagshub-docs

          if clone_repo "{{ .Values.workbench.gitSync.notebook.repo }}" "{{ .Values.workbench.gitSync.notebook.branch }}" /tmp/notebook-repo && [ -f "/tmp/notebook-repo/deploy/helm/workbench/hello_world_llm.ipynb" ]; then
            cp "/tmp/notebook-repo/deploy/helm/workbench/hello_world_llm.ipynb" /workspace/hello_world_llm.ipynb
            chmod 644 /workspace/hello_world_llm.ipynb 2>/dev/null || true
            echo "Notebook cloned successfully"
          fi
          rm -rf /tmp/notebook-repo
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      {{- end }}
      - name: workspace-setup
        image: {{ .Values.workbench.setupJob.image }}
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e
          echo "Starting workspace setup..."

          if [ ! -f /workspace/hello_world_llm.ipynb ] && [ -f /notebook-content/hello_world_llm.ipynb ]; then
            echo "Using notebook ConfigMap fallback..."
            cp /notebook-content/hello_world_llm.ipynb /workspace/hello_world_llm.ipynb
          fi

          if [ ! -d /workspace/docs ] || [ -z "$(find /workspace/docs -name '*.md' 2>/dev/null | head -1)" ]; then
            echo "Using docs ConfigMap fallback..."
            mkdir -p /workspace/docs
            if [ -d /docs-content ]; then
              for file in /docs-content/*; do
                if [ -f "$file" ]; then
                  basename=$(basename "$file")
                  target_path=$(echo "$basename" | sed 's/_/\//g')
                  target_dir=$(dirname "/workspace/$target_path")
                  mkdir -p "$target_dir"
                  cp "$file" "/workspace/$target_path"
                fi
              done
              echo "Documentation copied from ConfigMap fallback"
            fi
          fi

          # Create welcome README
          cat > /workspace/README.md << 'EOF'
          # DagsHub LLM Tutorial Workspace

          Welcome to your DagsHub LLM Tutorial workbench!

          ## Getting Started

          1. Open the `hello_world_llm.ipynb` notebook to start the tutorial
          2. Follow the step-by-step instructions to build an end-to-end LLM application
          3. Learn about RAG, fine-tuning, and evaluation with DagsHub

          ## What You'll Learn

          - Problem Definition for LLM applications
          - Data Preparation and vector embeddings
          - Model & Prompt Selection
          - Fine-tuning with LoRA
          - Testing & Evaluation with RAGAS

          ## DagsHub Integration

          This workbench is pre-configured to connect to your DagsHub instance at:
          `{{ .Values.workbench.dagsHub.host }}`

          ## Documentation

          {{- if .Values.workbench.gitSync.enabled }}
          The `docs/` directory contains the latest DagsHub documentation
          pulled from the official repository, and the notebook is from the
          upstream project repository.
          {{- else }}
          The `docs/` directory contains DagsHub documentation.
          {{- end }}

          Happy learning!
          EOF

          # Set proper permissions
          find /workspace -type f -exec chmod 644 {} \; 2>/dev/null || true

          # Create .jupyter directory
          mkdir -p /workspace/.jupyter

          echo "Workspace setup complete!"
          ls -la /workspace/
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: notebook-content
          mountPath: /notebook-content
        - name: docs-content
          mountPath: /docs-content
      containers:
      - name: {{ .Values.workbench.name }}-notebook
        image: {{ .Values.workbench.image.repository }}:{{ .Values.workbench.image.tag }}
        imagePullPolicy: {{ .Values.workbench.image.pullPolicy }}
        workingDir: /opt/app-root/src
        env:
        - name: NOTEBOOK_ARGS
          value: >-
            --ServerApp.port=8888
            --ServerApp.token=''
            --ServerApp.password=''
            --ServerApp.base_url=/notebook/{{ .Release.Namespace }}/{{ .Values.workbench.name }}-notebook
            --ServerApp.quit_button=False
        - name: RESTARTABLE
          value: "yes"
        - name: JUPYTER_IMAGE
          value: {{ .Values.workbench.image.repository }}:{{ .Values.workbench.image.tag }}
        # Jupyter runtime directories - set to writable locations for OpenShift
        - name: JUPYTER_RUNTIME_DIR
          value: /opt/app-root/src/.jupyter/runtime
        - name: JUPYTER_DATA_DIR
          value: /opt/app-root/src/.jupyter/data
        - name: JUPYTER_CONFIG_DIR
          value: /opt/app-root/src/.jupyter/config
        # IPython configuration
        - name: IPYTHONDIR
          value: /opt/app-root/src/.ipython
        # Set HOME to writable location for OpenShift arbitrary UIDs
        - name: HOME
          value: /opt/app-root/src
        # Disable conda config file in home directory
        - name: CONDARC
          value: /opt/app-root/src/.condarc
        # DagsHub client configuration
        - name: DAGSHUB_CLIENT_HOST
          value: {{ .Values.workbench.dagsHub.host | quote }}
        ports:
        - containerPort: 8888
          name: notebook-port
          protocol: TCP
        resources:
          limits:
            cpu: {{ .Values.workbench.resources.limits.cpu | quote }}
            memory: {{ .Values.workbench.resources.limits.memory | quote }}
          requests:
            cpu: {{ .Values.workbench.resources.requests.cpu | quote }}
            memory: {{ .Values.workbench.resources.requests.memory | quote }}
        startupProbe:
          httpGet:
            scheme: HTTP
            path: /notebook/{{ .Release.Namespace }}/{{ .Values.workbench.name }}-notebook/api
            port: notebook-port
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 60
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          httpGet:
            scheme: HTTP
            path: /notebook/{{ .Release.Namespace }}/{{ .Values.workbench.name }}-notebook/api
            port: notebook-port
        readinessProbe:
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          httpGet:
            scheme: HTTP
            path: /notebook/{{ .Release.Namespace }}/{{ .Values.workbench.name }}-notebook/api
            port: notebook-port
        volumeMounts:
        - name: workspace
          mountPath: /opt/app-root/src
        {{- if .Values.workbench.shm.enabled }}
        - name: shm
          mountPath: /dev/shm
        {{- end }}
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: {{ .Values.workbench.name }}-notebook-pvc
      - name: notebook-content
        configMap:
          name: {{ .Values.workbench.name }}-notebook-content
      - name: docs-content
        configMap:
          name: {{ .Values.workbench.name }}-docs-content
      {{- if .Values.workbench.shm.enabled }}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.workbench.shm.size }}
      {{- end }}
{{- end }}
